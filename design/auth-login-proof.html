<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Meridian — Sign in (design proof)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink: #0F1A2A;
    --graphite: #1B2737;
    --vellum: #F6F7F9;
    --mist: #D7DEE6;
    --slate: #889AAD;        /* lifted for legibility on dark */
    --slate-deep: #4F6072;
    --brass: #CDA349;
    --brass-soft: #E2C079;

    --font-display: "Fraunces", Georgia, serif;
    --font-sans: "Geist", system-ui, sans-serif;
    --font-mono: "Geist Mono", ui-monospace, monospace;

    --radius: 8px;
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: var(--font-sans);
    color: var(--vellum);
    background: var(--ink);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  .screen {
    min-height: 100dvh;
    display: grid;
    grid-template-columns: 1.08fr 0.92fr;
  }

  /* ---------- Left: the chart ---------- */
  .chart {
    position: relative;
    overflow: hidden;
    border-right: 1px solid color-mix(in srgb, var(--brass) 55%, transparent);
    background:
      radial-gradient(120% 90% at 100% 50%, rgba(205,163,73,0.05), transparent 55%),
      radial-gradient(100% 100% at 30% 30%, #122033, var(--ink) 70%);
    padding: clamp(40px, 5vw, 72px);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .chart-grid {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }
  .chart-grid line, .chart-grid path { stroke: var(--mist); fill: none; }

  .brand {
    position: relative;
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: var(--font-mono);
    font-weight: 500;
    letter-spacing: 0.28em;
    font-size: 13px;
    text-transform: uppercase;
    color: var(--vellum);
  }
  .brand-mark { width: 20px; height: 20px; }
  .brand-mark line, .brand-mark circle { stroke: var(--brass); fill: none; stroke-width: 1.2; }

  .lede {
    position: relative;
    max-width: 19ch;
  }
  .lede h1 {
    font-family: var(--font-display);
    font-weight: 400;
    font-optical-sizing: auto;
    font-size: clamp(34px, 4.4vw, 60px);
    line-height: 1.04;
    letter-spacing: -0.015em;
    margin: 0;
    color: var(--vellum);
  }
  .lede h1 em {
    font-style: italic;
    color: var(--brass-soft);
  }
  .coord {
    position: relative;
    font-family: var(--font-mono);
    font-size: 11.5px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--slate);
  }

  /* ---------- Right: the instrument plate ---------- */
  .panel {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: clamp(28px, 4vw, 64px);
    background: var(--ink);
  }
  .plate {
    width: 100%;
    max-width: 380px;
    background: linear-gradient(180deg, color-mix(in srgb, var(--graphite) 92%, #fff 2%), var(--graphite));
    border: 1px solid color-mix(in srgb, var(--mist) 13%, transparent);
    border-radius: var(--radius);
    box-shadow: 0 1px 0 rgba(255,255,255,0.03) inset, 0 24px 60px -32px rgba(0,0,0,0.7);
    padding: 30px;
  }

  .cartouche {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--slate);
    padding-bottom: 16px;
    margin-bottom: 22px;
    border-bottom: 1px solid color-mix(in srgb, var(--mist) 12%, transparent);
  }
  .cartouche .title { color: var(--vellum); font-weight: 500; }

  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    font-size: 12.5px;
    font-weight: 500;
    color: color-mix(in srgb, var(--vellum) 78%, transparent);
    margin-bottom: 7px;
  }
  .field input {
    width: 100%;
    font-family: var(--font-sans);
    font-size: 14.5px;
    color: var(--vellum);
    background: #14202F;
    border: 1px solid color-mix(in srgb, var(--mist) 14%, transparent);
    border-radius: 6px;
    padding: 11px 13px;
    outline: none;
    transition: border-color 140ms ease-out, box-shadow 140ms ease-out;
  }
  .field input::placeholder { color: var(--slate-deep); }
  .field input:focus-visible {
    border-color: var(--brass);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--brass) 26%, transparent);
  }

  .row {
    display: flex;
    justify-content: flex-end;
    margin: -4px 0 20px;
  }
  .link {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--slate);
    text-decoration: none;
    transition: color 140ms ease-out;
  }
  .link:hover { color: var(--brass-soft); }

  .submit {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 9px;
    font-family: var(--font-sans);
    font-size: 14.5px;
    font-weight: 600;
    letter-spacing: 0.01em;
    color: var(--ink);
    background: var(--brass);
    border: none;
    border-radius: 6px;
    padding: 12px 16px;
    cursor: pointer;
    transition: transform 120ms ease-out, background 140ms ease-out;
  }
  @media (hover: hover) and (pointer: fine) {
    .submit:hover { background: var(--brass-soft); }
  }
  .submit:active { transform: scale(0.985); }
  .submit:focus-visible {
    outline: none;
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--brass) 35%, transparent);
  }
  .submit svg { width: 15px; height: 15px; }

  .alt {
    text-align: center;
    margin-top: 22px;
    font-size: 13px;
    color: var(--slate);
  }
  .alt a {
    color: var(--vellum);
    text-decoration: none;
    border-bottom: 1px solid color-mix(in srgb, var(--brass) 50%, transparent);
    padding-bottom: 1px;
  }

  /* ---------- Entrance (rare event — allowed) ---------- */
  .chart-grid line, .chart-grid path {
    stroke-dasharray: 1;
    stroke-dashoffset: 1;
    animation: draw 1500ms ease forwards;
  }
  @keyframes draw { to { stroke-dashoffset: 0; } }

  .stagger > * {
    opacity: 0;
    transform: translateY(8px);
    animation: rise 520ms ease-out forwards;
  }
  .stagger > *:nth-child(1) { animation-delay: 120ms; }
  .stagger > *:nth-child(2) { animation-delay: 170ms; }
  .stagger > *:nth-child(3) { animation-delay: 220ms; }
  .stagger > *:nth-child(4) { animation-delay: 270ms; }
  .stagger > *:nth-child(5) { animation-delay: 320ms; }
  .stagger > *:nth-child(6) { animation-delay: 370ms; }
  @keyframes rise { to { opacity: 1; transform: translateY(0); } }

  @media (prefers-reduced-motion: reduce) {
    .chart-grid line, .chart-grid path { animation: none; stroke-dashoffset: 0; }
    .stagger > * { animation: none; opacity: 1; transform: none; }
  }

  /* ---------- Responsive: stack to plate ---------- */
  @media (max-width: 820px) {
    .screen { grid-template-columns: 1fr; }
    .chart {
      border-right: none;
      border-bottom: 1px solid color-mix(in srgb, var(--brass) 55%, transparent);
      min-height: 240px;
      gap: 28px;
    }
    .lede h1 { font-size: 34px; }
  }
</style>
</head>
<body>
  <main class="screen">
    <!-- LEFT: the chart -->
    <section class="chart">
      <svg class="chart-grid" id="grid" preserveAspectRatio="xMidYMid slice" aria-hidden="true"></svg>

      <div class="brand">
        <svg class="brand-mark" viewBox="0 0 24 24" aria-hidden="true">
          <line x1="12" y1="2" x2="12" y2="22" />
          <line x1="3" y1="12" x2="21" y2="12" />
          <circle cx="12" cy="12" r="7" />
        </svg>
        Meridian
      </div>

      <div class="lede">
        <h1>Where every edit&nbsp;<em>converges.</em></h1>
      </div>

      <div class="coord">51°28′N&nbsp;&nbsp;0°00′W · Prime Meridian</div>
    </section>

    <!-- RIGHT: the instrument plate -->
    <section class="panel">
      <form class="plate stagger" onsubmit="return false">
        <div class="cartouche">
          <span>51°28′N · 0°00′W</span>
          <span class="title">Sign in</span>
        </div>

        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="you@studio.com" autocomplete="email" />
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="••••••••••" autocomplete="current-password" />
        </div>

        <div class="row">
          <a class="link" href="#">Forgot password</a>
        </div>

        <button class="submit" type="submit">
          Continue
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="5" y1="12" x2="19" y2="12" /><polyline points="12 5 19 12 12 19" />
          </svg>
        </button>

        <p class="alt">New to Meridian? <a href="#">Create an account</a></p>
      </form>
    </section>
  </main>

  <script>
    // Convergence graticule: meridians + parallels converging to a focal point at the seam.
    (function () {
      const svg = document.getElementById('grid');
      const W = 900, H = 1000;
      svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
      const Fx = W, Fy = H * 0.5;            // focal point sits on the seam (right edge)
      const NS = 'http://www.w3.org/2000/svg';
      let delay = 0;

      // Meridians — radial lines fanning left from the focal point.
      const count = 15;
      for (let i = 0; i <= count; i++) {
        const t = i / count;
        const angle = Math.PI * (0.62 + t * 0.76);   // spread across the left hemisphere
        const len = W * 1.5;
        const x2 = Fx + Math.cos(angle) * len;
        const y2 = Fy + Math.sin(angle) * len;
        const line = document.createElementNS(NS, 'line');
        line.setAttribute('x1', Fx); line.setAttribute('y1', Fy);
        line.setAttribute('x2', x2); line.setAttribute('y2', y2);
        const near = 1 - Math.abs(t - 0.5) * 2;       // brighter toward the equator line
        line.setAttribute('stroke-width', '1');
        line.style.opacity = (0.06 + near * 0.10).toFixed(3);
        line.style.animationDelay = (delay += 40) + 'ms';
        svg.appendChild(line);
      }

      // Parallels — concentric arcs centered on the focal point.
      const rings = 7;
      for (let r = 1; r <= rings; r++) {
        const rad = (W / rings) * r * 0.92;
        const path = document.createElementNS(NS, 'path');
        const a0 = Math.PI * 0.6, a1 = Math.PI * 1.4;
        const x0 = Fx + Math.cos(a0) * rad, y0 = Fy + Math.sin(a0) * rad;
        const x1 = Fx + Math.cos(a1) * rad, y1 = Fy + Math.sin(a1) * rad;
        path.setAttribute('d', `M ${x0} ${y0} A ${rad} ${rad} 0 0 1 ${x1} ${y1}`);
        path.setAttribute('stroke-width', '1');
        path.style.opacity = (0.05 + (r / rings) * 0.05).toFixed(3);
        path.style.animationDelay = (140 + r * 55) + 'ms';
        svg.appendChild(path);
      }

      // The convergence node — a soft brass mark where the lines meet.
      const node = document.createElementNS(NS, 'circle');
      node.setAttribute('cx', Fx); node.setAttribute('cy', Fy); node.setAttribute('r', '3');
      node.setAttribute('fill', '#CDA349'); node.setAttribute('stroke', 'none');
      node.style.opacity = '0.9';
      svg.appendChild(node);
    })();
  </script>
</body>
</html>
