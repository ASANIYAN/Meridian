# nginx config for the production SPA (FE-SETUP-7). Plain static-file server —
# the app calls VITE_API_URL directly (src/lib/api/client.ts), so nginx has no
# REST proxying to do. No envsubst needed; nothing in this file is templated.

server {
    listen      80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # Don't let missing assets surface nginx's default pages.
    server_tokens off;

    # Hashed build assets are content-addressed and immutable — cache hard.
    location /assets/ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # SPA history fallback — every other path serves index.html so client-side
    # routes (e.g. /documents/:id, /join/:id) resolve on a hard refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
